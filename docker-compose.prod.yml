# Production stack for a single VM (GCP e2-micro or similar).
# Secrets live in .env on the server — see .env.example and docs/DEPLOY_GCP.md.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ENV: production
      DATABASE_AUTO_CREATE: "true"
      DATABASE_AUTO_MIGRATE: "true"
      DATABASE_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
      DATABASE_URL_SYNC: postgresql://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      REDIS_STREAM_DB: "0"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: rag-uploads
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: .
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "rag_document_processor.workers.celery_app",
        "worker",
        "-l",
        "info",
        "--concurrency=2",
      ]
    env_file: .env
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
      DATABASE_URL_SYNC: postgresql://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      REDIS_STREAM_DB: "0"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: rag-uploads
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      api:
        condition: service_started

volumes:
  pgdata:
  miniodata:
