name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [stage]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            if [[ ! -f .env ]]; then
              echo "ERROR: .env is missing on the VM." >&2
              echo "One-time setup: cp .env.example .env && nano .env (see docs/DEPLOY_GCP.md)" >&2
              exit 1
            fi

            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

            NETWORK=$(docker network ls --format '{{.Name}}' | grep rag-document-processor | head -1)
            docker run --rm --network "$NETWORK" minio/mc alias set local http://minio:9000 minioadmin minioadmin
            docker run --rm --network "$NETWORK" minio/mc mb local/rag-uploads --ignore-existing

            docker compose -f docker-compose.prod.yml ps
            curl -sf http://localhost:8000/api/v1/health
            echo "Deploy OK — health check passed"
